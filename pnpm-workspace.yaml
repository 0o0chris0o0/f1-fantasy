packages:
  - apps/*
  - packages/*

allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  vue-demi: true

minimumReleaseAgeExclude:
  - '@vitest/expect@4.1.9'
  - '@vitest/mocker@4.1.9'
  - '@vitest/pretty-format@4.1.9'
  - '@vitest/runner@4.1.9'
  - '@vitest/snapshot@4.1.9'
  - '@vitest/spy@4.1.9'
  - '@vitest/utils@4.1.9'
  - vitest@4.1.9

onlyBuiltDependencies:
  - '@firebase/util'
  - '@parcel/watcher'
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
  - vue-demi
