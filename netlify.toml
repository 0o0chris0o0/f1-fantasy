[build]
  base = "/"
  command = "pnpm --filter @f1pick6/web nuxi prepare && pnpm --filter @f1pick6/web build"
  publish = "apps/web/.output/public"

[build.environment]
  # Crucial for Nuxt + pnpm on Netlify
  PNPM_FLAGS = "--shamefully-hoist"
  # Set the Node version to match your local environment
  NODE_VERSION = "20" 