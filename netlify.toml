[build]
  # Tell Netlify to run the build from the root
  base = "/"
  # Use the pnpm filter to build only the web app
  command = "pnpm run build"
  # Point to the Nuxt output directory relative to the root
  publish = "apps/web/.output/public"

[build.environment]
  # Crucial for Nuxt + pnpm on Netlify
  PNPM_FLAGS = "--shamefully-hoist"
  # Set the Node version to match your local environment
  NODE_VERSION = "24" 